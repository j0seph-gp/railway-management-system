<!DOCTYPE html>
<html>
<head>
    <title>Edit Train</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body> 
    <div class=""container">
    <h1>Edit Train</h1>

    <form method="POST">
        Train Number: 
        <input type="number" name="train_no" value="{{ train[0] }}" readonly><br><br>

        Train Name: 
        <input type="text" name="train_name" value="{{ train[1] }}" required><br><br>

        Source: 
        <input type="text" name="source" value="{{ train[2] }}" required><br><br>

        Destination: 
        <input type="text" name="destination" value="{{ train[3] }}" required><br><br>

        Total Seats: 
        <input type="number" name="total_seats" value="{{ train[4] }}" required><br><br>

        Available Seats: 
        <input type="number" name="available_seats" value="{{ train[5] }}" required><br><br>

        <button type="submit">Update Train</button>
    </form>

    <br>
    <a href="/">Back to Home</a>
</div>
</body>
</html>
