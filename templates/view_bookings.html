<!DOCTYPE html>
<html>
<head>
    <title>All Bookings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h2 style="text-align:center;">All Bookings</h2>

        {% if records %}
            <table>
                <tr>
                    <th>Booking ID</th>
                    <th>Passenger Name</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Train Name</th>
                    <th>Seats Booked</th>
                </tr>

                {% for row in records %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }}</td>
                    <td>{{ row[4] }}</td>
                    <td>{{ row[5] }}</td>
                </tr>
                {% endfor %}
            </table>
        {% else %}
            <p style="text-align:center;">No bookings found.</p>
        {% endif %}

        <br>
        <div style="text-align:center;">
            <a href="/">Back to Home</a>
        </div>
    </div>

</body>
</html>
